<header class="bg-[#f3f4f6] border-b border-gray-200 sticky top-0 z-50">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-16">
      <!-- Logo -->
      <div class="flex items-center">
        <button (click)="navigateTo('home')" class="text-2xl md:text-3xl font-bold text-indigo-600 cursor-pointer border-none bg-none">InterviewAI</button>
      </div>

      <!-- Desktop Navigation -->
      <nav class="hidden md:flex items-center gap-10">
        <button (click)="navigateTo('features')" class="text-gray-700 font-medium hover:text-indigo-600 transition cursor-pointer border-none bg-none"> Product </button>
        <button (click)="navigateTo('enterprise')" class="text-gray-700 font-medium hover:text-indigo-600 transition cursor-pointer border-none bg-none">
          Solutions
        </button>
        <button (click)="navigateTo('pricing')" class="text-gray-700 font-medium hover:text-indigo-600 transition cursor-pointer border-none bg-none"> Pricing </button>
        <button (click)="navigateTo('blog')" class="text-gray-700 font-medium hover:text-indigo-600 transition cursor-pointer border-none bg-none">
          Resources
        </button>
      </nav>

      <!-- Desktop Actions -->
      <div class="hidden md:flex items-center gap-6">
        <button (click)="router.navigate(['auth/login'])" class="text-gray-700 font-semibold hover:text-indigo-600 transition cursor-pointer border-none bg-none">
          Sign In
        </button>

        <button
          (click)="navigateTo('home')"
          class="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold px-6 py-2.5 rounded-lg shadow-sm transition-all duration-200 cursor-pointer"
        >
          Get Started
        </button>
      </div>

      <!-- Mobile Menu Button -->
      <button class="md:hidden p-2" (click)="toggleMenu()">
        <svg
          *ngIf="!isMenuOpen"
          xmlns="http://www.w3.org/2000/svg"
          class="h-7 w-7 text-gray-700"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M4 6h16M4 12h16M4 18h16"
          />
        </svg>

        <svg
          *ngIf="isMenuOpen"
          xmlns="http://www.w3.org/2000/svg"
          class="h-7 w-7 text-gray-700"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M6 18L18 6M6 6l12 12"
          />
        </svg>
      </button>
    </div>

    <!-- Mobile Menu -->
    <div *ngIf="isMenuOpen" class="md:hidden py-4 border-t border-gray-200">
      <nav class="flex flex-col gap-4">
        <button (click)="navigateTo('features')" class="text-gray-700 font-medium text-left cursor-pointer border-none bg-none">Product</button>
        <button (click)="navigateTo('enterprise')" class="text-gray-700 font-medium text-left cursor-pointer border-none bg-none">Solutions</button>
        <button (click)="navigateTo('pricing')" class="text-gray-700 font-medium text-left cursor-pointer border-none bg-none">Pricing</button>
        <button (click)="navigateTo('blog')" class="text-gray-700 font-medium text-left cursor-pointer border-none bg-none">Resources</button>

        <hr />

        <button (click)="navigateTo('home')" class="text-gray-700 font-semibold text-left cursor-pointer border-none bg-none"> Sign In </button>

        <button (click)="navigateTo('home')" class="bg-indigo-600 text-white py-3 rounded-lg font-semibold w-full cursor-pointer">Get Started</button>
      </nav>
    </div>
  </div>
</header>
