<section class="bg-slate-50 py-20">
  <div class="max-w-7xl mx-auto px-6">
    <!-- Heading -->
    <div class="mb-12">
      <h2 class="text-4xl font-bold text-slate-900">Let's Connect</h2>

      <p class="text-slate-500 mt-3">
        We'd love to hear from you. Reach out and our team will respond.
      </p>
    </div>

    <div class="grid lg:grid-cols-2 gap-10">
      <!-- LEFT SECTION -->
      <div>
        <div class="space-y-4">
          @for (info of contactInfo; track info.title) {
            <div class="bg-white rounded-xl p-5 border border-slate-100 shadow-sm">
              <div class="flex gap-4">
                <div class="w-10 h-10 rounded-lg bg-indigo-50 flex items-center justify-center">
                  {{ info.icon }}
                </div>

                <div>
                  <h3 class="font-semibold">
                    {{ info.title }}
                  </h3>

                  <p class="text-slate-500 text-sm mt-1">
                    {{ info.value }}
                  </p>
                </div>
              </div>
            </div>
          }
        </div>

        <!-- Map Image -->

        <div class="mt-6 overflow-hidden rounded-2xl shadow-sm">
          <img
            src="assets/images/contact-map.jpg"
            alt="Office Location"
            class="w-full h-72 object-cover"
          />
        </div>
      </div>

      <!-- RIGHT SECTION -->

      <div class="bg-white rounded-2xl p-8 shadow-sm">
        <form class="space-y-5">
          <div class="grid md:grid-cols-2 gap-4">
            <div>
              <label class="block text-sm mb-2"> First Name </label>

              <input type="text" class="w-full border border-slate-200 rounded-lg px-4 py-3" />
            </div>

            <div>
              <label class="block text-sm mb-2"> Last Name </label>

              <input type="text" class="w-full border border-slate-200 rounded-lg px-4 py-3" />
            </div>
          </div>

          <div class="grid md:grid-cols-2 gap-4">
            <div>
              <label class="block text-sm mb-2"> Email </label>

              <input type="email" class="w-full border border-slate-200 rounded-lg px-4 py-3" />
            </div>

            <div>
              <label class="block text-sm mb-2"> Company </label>

              <input type="text" class="w-full border border-slate-200 rounded-lg px-4 py-3" />
            </div>
          </div>

          <div>
            <label class="block text-sm mb-2"> Message </label>

            <textarea rows="6" class="w-full border border-slate-200 rounded-lg px-4 py-3">
            </textarea>
          </div>

          <button type="submit" class="w-full bg-indigo-600 text-white py-3 rounded-lg font-medium">
            Send Message
          </button>
        </form>
      </div>
    </div>

    <!-- Quick Links -->

    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mt-12">
      @for (link of quickLinks; track link.title) {
        <div class="bg-white rounded-xl p-5 shadow-sm text-center hover:shadow-md transition">
          <div class="text-2xl">
            {{ link.icon }}
          </div>

          <h3 class="mt-3 font-medium">
            {{ link.title }}
          </h3>
        </div>
      }
    </div>
  </div>
</section>
